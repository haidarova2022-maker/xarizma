name: Bitrix24 Sync

on:
  schedule:
    # Every hour at :15 (Moscow time = UTC+3)
    - cron: "15 * * * *"
  workflow_dispatch:
    inputs:
      full_sync:
        description: "Run full sync (all deals)"
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/bitrix-sync

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/bitrix-sync/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          BITRIX_WEBHOOK_URL: ${{ secrets.BITRIX_WEBHOOK_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ "${{ github.event.inputs.full_sync }}" = "true" ]; then
            python main.py --full
          else
            python main.py
          fi
