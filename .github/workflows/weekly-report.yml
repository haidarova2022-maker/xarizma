name: Weekly Analytics Report

on:
  schedule:
    # Every Wednesday at 05:00 UTC (08:00 Moscow time)
    - cron: "0 5 * * 3"
  workflow_dispatch:

jobs:
  analytics:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/analytics-agent

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/analytics-agent/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write service account JSON
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: Run analytics agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRIVE_REPORTS_FOLDER_ID: ${{ secrets.DRIVE_REPORTS_FOLDER_ID }}
          DRIVE_OUTPUT_FOLDER_ID: ${{ secrets.DRIVE_OUTPUT_FOLDER_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-${{ github.run_id }}
          path: |
            scripts/analytics-agent/output/*.html
            scripts/analytics-agent/output/*.docx
          retention-days: 7
